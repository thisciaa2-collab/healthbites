<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Cuenta | Delicias</title>
    <style>
        /* Mismos estilos que login.html para mantener consistencia */
        body { font-family: sans-serif; background: #FAF9F6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: white; padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { margin-bottom: 20px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; margin-top: 10px; }
        .btn-google { background: #4285F4; color: white; }
        .btn-main { background: #E85F33; color: white; }
        .guest-link { text-align: center; margin-top: 15px; display: block; color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2>Crear Cuenta</h2>
        <input type="email" placeholder="Correo electrónico">
        <input type="password" placeholder="Contraseña">
        <button class="btn btn-main">Registrarse</button>
        <button class="btn btn-google">Registrarse con Google</button>
        <a href="login.html" class="guest-link">¿Ya tienes cuenta? Inicia sesión</a>
    </div>
</body>
</html>
